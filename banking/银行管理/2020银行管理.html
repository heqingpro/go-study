    }

      padding: 12px;
    }
    h1 {
      text-align: center;
      font-size: 22px;
      margin: 12px 0;
    }
    .mode-buttons {
      display: flex;

      gap: 6px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    button {
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid #ccc;
      background: #ecf0f1;
      font-size: 16px;
      touch-action: manipulation;
      cursor: pointer;
    }
    button.active {
      background: #3498db;
      color: #fff;
    }
    .progress {
      text-align: center;
      margin-bottom: 10px;
    }
    .question-title {
      font-weight: bold;
      font-size: 20px;
      text-align: center;
      margin: 16px 0;
      line-height: 1.6;
    }
    .option {
      display: flex;
      align-items: center;
      width: 100%;
      padding: 18px 14px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 12px;
      background: #fff;
      touch-action: manipulation;
      cursor: pointer;
      min-height: 60px;
    }
    .option.locked {
      pointer-events: none;
      opacity: 0.85;
    }
    .option input {
      transform: scale(1.4);
      margin-right: 12px;
    }
    .option.selected {
      background: #e3f2fd;
      border: 2px solid #2196f3;
    }
    .option.option-correct {
      background: #d4edda !important;
      border-color: #c3e6cb !important;
    }
    .option.option-wrong {
      background: #f8d7da !important;
      border-color: #f5c6cb !important;
    }
    .result {
      margin: 10px 0;
      padding: 10px;
      border-radius: 6px;
      display: none;
      text-align: center;
    }
    .result.correct { background: #d4edda; color: #060; }
    .result.incorrect { background: #f8d7da; color: #900; }
    .explanation {
      padding: 12px;
      background: #f5f9ff;
      border-radius: 8px;
      margin: 10px 0;
      display: none;
      line-height: 1.6;
    }
    .navigation {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .navigation button {
      flex: 1;
    }
    .submit-btn {
      background: #27ae60;
      color: #fff;
    }
    .stats {
      padding: 12px;
      background: #f5f5f5;
      border-radius: 8px;
      margin: 10px 0;
      display: none;

        "options": [

        ],

        "explanation": "开放式公募理财产品应持有不低于产品净资产5%的现金或一年以内高流动性债券。"

    {

        "type": "judge",
        "question": "根据《民法典》第四百零六条规定，抵押期间，抵押人可以转让抵押财产，但应当及时通知抵押权人，抵押权人能够证明抵押财产转让可能损害抵押权的，有权予以拒绝。",
        "options": [
            { "value": "A", "text": "错" },
            { "value": "B", "text": "对" }
        ],
        "correctAnswer": "A",
        "explanation": "抵押期间抵押人可转让抵押财产，应通知抵押权人；抵押权人能证明损害抵押权的，可请求提前清偿或提存，无权直接拒绝转让。"
    }
];

 // 兼容性处理：如果题目数据是字符串形式，尝试解析为 JSON，如果解析失败则保持原样（可能是直接定义的对象数组）
try {
  questions = JSON.parse(questions);
} catch (e) {
  console.error("JSON 格式错误", e);
  questions = questions;
}

 // 顺序进度
function saveSequentialIndex(idx) { localStorage.setItem(pageTitle + "_lastSequentialIndex", idx); }
function loadSequentialIndex() { const v = localStorage.getItem(pageTitle + "_lastSequentialIndex"); return v ? parseInt(v) : 0; }

let currentMode = "random";
let currentQuestionIndex = 0;
let shuffledIndices = [];
let errorList = []; // 🔥 错题独立列表，不再复用索引
let answeredCorrectly = JSON.parse(localStorage.getItem(pageTitle + "_answeredCorrectly") || JSON.stringify(new Array(questions.length).fill(undefined)));
let isSubmitted = false;

function bindTap(el, callback) {
  function handler(e) { e.preventDefault(); callback(); }
  el.addEventListener("touchstart", handler);
  el.addEventListener("click", handler);
}

// 锁定/解锁选项
function lockOptions() { document.querySelectorAll(".option").forEach(o => o.classList.add("locked")); isSubmitted = true; }
function unlockOptions() { document.querySelectorAll(".option").forEach(o => o.classList.remove("locked","option-correct","option-wrong")); isSubmitted = false; }

// 🔥 重新获取最新错题列表（每次切换都刷新，杜绝错乱）
function refreshErrorList() {
  errorList = answeredCorrectly.map((ok, i) => ok === false ? i : -1).filter(i => i !== -1);
}

function initPage() {
  bindAll();
  startQuiz();
}

function bindAll() {
  bindTap(document.getElementById("randomModeBtn"), ()=>switchMode("random"));
  bindTap(document.getElementById("seqModeBtn"), ()=>switchMode("sequential"));
  bindTap(document.getElementById("errorModeBtn"), ()=>switchMode("error"));
  bindTap(document.getElementById("prevBtn"), showPrevQuestion);
  bindTap(document.getElementById("nextBtn"), showNextQuestion);
  bindTap(document.getElementById("submitBtn"), submitAnswer);
  bindTap(document.getElementById("showStatsBtn"), toggleStats);
  bindTap(document.getElementById("closeStatsBtn"), ()=>{ document.getElementById("statsDiv").style.display = "none"; });
}

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll(".mode-buttons button").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
  startQuiz();
}

// 🔥 核心：错题模式每次切换都重建列表，彻底解决索引错乱
function startQuiz() {
  if (currentMode === "random") {
    shuffledIndices = [...Array(questions.length).keys()].sort(()=>Math.random()-0.5);
    currentQuestionIndex = 0;
  } else if (currentMode === "sequential") {
    currentQuestionIndex = loadSequentialIndex();
  } else if (currentMode === "error") {
    refreshErrorList(); // 🔥 每次进错题都重新算一遍，保证最新
    if (errorList.length === 0) { alert("暂无错题！"); return; }
    currentQuestionIndex = 0;
  }
  showCurrentQuestion();
  updateProgress();
}

function showCurrentQuestion() {
  unlockOptions();
  const ctn = document.getElementById("quizContainer");
  let realIdx;

  if (currentMode === "sequential") {
    realIdx = currentQuestionIndex;
  } else if (currentMode === "error") {
    if (errorList.length === 0) return;
    realIdx = errorList[currentQuestionIndex]; // 🔥 只从独立错题列表取
  } else {
    realIdx = shuffledIndices[currentQuestionIndex];
  }

  const q = questions[realIdx];
  let html = `
    <div class="question-title">${q.id}. ${q.question}</div>
    <div class="options">
  `;
  q.options.forEach(opt => {
    const oid = `opt_${q.id}_${opt.value}`;
    const t = (q.type==="single"||q.type==="judge") ? "radio" : "checkbox";
    html += `
      <div class="option" data-qid="${q.id}" data-val="${opt.value}" data-type="${q.type}">
        <input type="${t}" name="ans_${q.id}" id="${oid}" value="${opt.value}">
        <label for="${oid}">${opt.value}. ${opt.text}</label>
      </div>
    `;
  });
  html += `
    </div>
    <div class="result" id="res_${q.id}"></div>
    <div class="explanation" id="exp_${q.id}">${q.explanation}</div>
  `;
  ctn.innerHTML = html;

  document.querySelectorAll(".option").forEach(item => {
    bindTap(item, () => { if (!isSubmitted) selectOption(item); });
  });
}

function selectOption(el) {
  const type = el.dataset.type;
  const group = el.parentElement.querySelectorAll(".option");
  if (type === "single" || type === "judge") {
    group.forEach(g => { g.classList.remove("selected"); g.querySelector("input").checked = false; });
    el.classList.add("selected"); el.querySelector("input").checked = true;
  } else {
    el.classList.toggle("selected");
    el.querySelector("input").checked = el.classList.contains("selected");
  }
}

// 🔥 提交逻辑：错题模式不再修改记录，只判分
function submitAnswer() {
  if (isSubmitted) return;
  let realIdx;
  if (currentMode === "sequential") {
    realIdx = currentQuestionIndex;
  } else if (currentMode === "error") {
    if (errorList.length === 0) return;
    realIdx = errorList[currentQuestionIndex];
  } else {
    realIdx = shuffledIndices[currentQuestionIndex];
  }

  const q = questions[realIdx];
  const selected = Array.from(document.querySelectorAll(`input[name="ans_${q.id}"]:checked`)).map(i=>i.value);
  if (selected.length === 0) { alert("请选择答案！"); return; }

  const isCorrect = Array.isArray(q.correctAnswer)
    ? selected.length === q.correctAnswer.length && selected.every(v=>q.correctAnswer.includes(v))
    : selected[0] === q.correctAnswer;

  // 显示结果
  const resEl = document.getElementById(`res_${q.id}`);
  resEl.style.display = "block";
  resEl.className = "result " + (isCorrect ? "correct" : "incorrect");
  resEl.textContent = isCorrect ? "回答正确！" : "回答错误！";
  document.getElementById(`exp_${q.id}`).style.display = "block";

  // 正确标绿，选错变红
  const correctAns = Array.isArray(q.correctAnswer) ? q.correctAnswer : [q.correctAnswer];
  document.querySelectorAll(`.option[data-qid="${q.id}"]`).forEach(opt => {
    const v = opt.dataset.val;
    if (correctAns.includes(v)) opt.classList.add("option-correct");
    else if (selected.includes(v)) opt.classList.add("option-wrong");
  });

  // 非错题模式才更新记录
  if (currentMode !== "error") {
    answeredCorrectly[realIdx] = isCorrect;
    localStorage.setItem(pageTitle + "_answeredCorrectly", JSON.stringify(answeredCorrectly));
  }

  lockOptions();
  updateProgress();
}

// 🔥 下一题：严格基于当前模式总数计算
function showNextQuestion() {
  let total = currentMode === "error" ? errorList.length : questions.length;
  if (total === 0) return;
  currentQuestionIndex = (currentQuestionIndex + 1) % total;
  if (currentMode === "sequential") saveSequentialIndex(currentQuestionIndex);
  showCurrentQuestion();
  updateProgress();
}
function showPrevQuestion() {
  let total = currentMode === "error" ? errorList.length : questions.length;
  if (total === 0) return;
  currentQuestionIndex = (currentQuestionIndex - 1 + total) % total;
  if (currentMode === "sequential") saveSequentialIndex(currentQuestionIndex);
  showCurrentQuestion();
  updateProgress();
}

// 🔥 进度：错题数量永远正确显示
function updateProgress() {
  const total = currentMode === "error" ? errorList.length : questions.length;
  document.getElementById("progressText").textContent = `进度: ${currentQuestionIndex + 1}/${total}`;
}

function toggleStats() {
  const s = document.getElementById("statsDiv");
  s.style.display = s.style.display === "block" ? "none" : "block";
  if (s.style.display === "block") showStats();
}
function showStats() {
  const totalAnswered = answeredCorrectly.filter(v=>v!==undefined).length;
  const correct = answeredCorrectly.filter(v=>v===true).length;
  const wrong = answeredCorrectly.filter(v=>v===false).length;
  const rate = totalAnswered ? ((correct/totalAnswered)*100).toFixed(1) : 0;
  document.getElementById("statsDiv").innerHTML = `
    <div style="display:flex;justify-content:space-between;">
      <span>答题统计</span><button id="closeStatsBtn">×</button>
    </div>
    总答题：${totalAnswered}<br>
    正确：${correct}｜错误：${wrong}<br>
    正确率：${rate}%<br>
    当前错题数：${errorList.length}
  `;
  bindTap(document.getElementById("closeStatsBtn"), ()=>{ document.getElementById("statsDiv").style.display = "none"; });
}

window.onload = initPage;
</script>
</body>
</html>
