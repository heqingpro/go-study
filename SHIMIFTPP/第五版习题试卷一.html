    {
        "content": "80. 2021年3月，英国金融行为监管局明确了Libor（伦敦同业拆借率）将逐步退出金融市场，自2022年起，商业银行必须使用新的基准利率报价，各国已经基本上重新制定了代替Libor的新基准利率。Libor的定价机制是英国银行家协会根据其选定的16家银行作为参考银行在伦敦报出各自的借贷利率根据此数据计算出伦敦同业拆借利率，巴克莱银行就是选定的16家参考银行之一。2008年金融危机全面爆发后，银行无法估算短期借贷存在的风险使得Libor利率飙升；较高的Libor导致一些银行存在破产风险。2010年，英国金融管理局就涉嫌操纵利率对巴克莱银行进行调查；2011年8月，总部设在旧金山的嘉信理财起诉11家参考银行共谋操纵Libor。调查中发现，巴克莱银行交易员与Libor报价人员通过邮件沟通，让其按照自己交易需求上报Libor。2012年6月，巴克莱银行因操纵和虚报Libor被美国期货交易委员会和英国金融管理局罚款。由于监管与市场选择等多重影响的叠加，同业拆借市场由于其他银行间融资模式的兴起而缩小。Libor退出金融市场是一场国际基准利率的改革，将对全球金融市场产生重大影响。结合阅读材料，从金融风险角度分析Libor逐渐不再被金融市场所接受的原因：（）。（1）Libor的报价机制需要16家选中的参考银行报出各自的借贷利率以此进行Libor的计算，这使得Libor机制天然存在信用风险。(2) Libor 被监管机构取消的一个主要原因是巴克莱银行在报价过程中存在非常严重的操作风险。（3）利率操作丑闻，金融危机等多重因素导致Libor这一全球最重要的基准利率对全球金融市场产生系统性风险。（4）Libor的报价机制使得16家参考银行在从事涉及自身利益的同时从事行业内的合规管理；这种监守自益导致的合规风险也是Libor逐渐退出市场的原因。",

for (let i = 1; i < questions.length; i++) {
  console.log(questions[i-1].sequence, i);
}

// ========== 存储键（独立不冲突） ==========
const STORAGE_KEY_DONE = "doneIds_" + QUESTION_SET_ID;
const STORAGE_KEY_WRONG = "wrong_" + QUESTION_SET_ID;

let doneIds = JSON.parse(localStorage.getItem(STORAGE_KEY_DONE) || "[]");
let wrong = JSON.parse(localStorage.getItem(STORAGE_KEY_WRONG) || "[]");

let current = null;
let lastQuestion = null;
let mode = "normal"; // normal 正常刷题 | wrong 只刷错题

function $(id) { return document.getElementById(id); }

// 去重已刷ID
function uniqueDone() {
  return [...new Set(doneIds)];
}

// 未刷题目列表
function undoneQuestions() {
  const d = uniqueDone();
  return questions.filter(q => !d.includes(q.id));
}

// 刷新统计
function refreshStat() {
  $("total").textContent = questions.length;
  $("done").textContent = uniqueDone().length;
  $("undone").textContent = undoneQuestions().length;
  $("wrong-cnt").textContent = wrong.length;
}

// 随机取一题
function randomPick(list) {
  if (!list || list.length === 0) return null;
  return list[Math.floor(Math.random() * list.length)];
}

// 渲染题目
function render(q) {
  if (!q) {
    $("qid").textContent = "";
    $("q").textContent = "暂无题目";
    $("opts").innerHTML = "";
    $("a").style.display = "none";
    return;
  }
  current = q;
  $("qid").textContent = `序号：${q.sequence} | ID：${q.id}`;
  $("q").textContent = q.content;
  $("a").style.display = "none";
  $("opts").innerHTML = "";

  q.attrs.forEach(o => {
    const div = document.createElement("div");
    div.className = "option";
    div.textContent = o.value;
    div.onclick = () => {
      $("a").style.display = "block";
      $("a").textContent = o.reason;
      const ok = /正确选项/.test(o.reason);
      div.classList.add(ok ? "correct" : "wrong");
      if (!ok && !wrong.some(x => x.id === q.id)) {
        wrong.push(q);
        localStorage.setItem(STORAGE_KEY_WRONG, JSON.stringify(wrong));
        refreshStat();
      }
    };
    $("opts").appendChild(div);
  });
}

// 下一题：点了才算刷过
function next() {
  // 把上一题标记为已刷
  if (lastQuestion) {
    if (!doneIds.includes(lastQuestion.id)) {
      doneIds.push(lastQuestion.id);
      localStorage.setItem(STORAGE_KEY_DONE, JSON.stringify(doneIds));
    }
  }

  // 选题逻辑：优先从未刷里随机
  let nextQ = null;
  if (mode === "normal") {
    const undone = undoneQuestions();
    if (undone.length > 0) {
      nextQ = randomPick(undone);
    } else {
      alert("已刷完全部题目！");
      nextQ = randomPick(questions);
    }
  } else {
    // 错题模式
    if (wrong.length === 0) {
      alert("暂无错题");
      mode = "normal";
      $("m-all").classList.add("active");
      $("m-wrong").classList.remove("active");
      next();
      return;
    }
    nextQ = randomPick(wrong);
  }

  lastQuestion = nextQ;
  render(nextQ);
  refreshStat();
}

// 错题列表
function showWrong() {
  let html = "<h4>错题列表</h4>";
  if (wrong.length === 0) html += "<p>暂无错题</p>";
  else wrong.forEach((q, i) => {
    html += `<div class="list-item">${i+1}. [${q.sequence}] ${q.content}</div>`;
  });
  $("list-content").innerHTML = html;
  $("modal").style.display = "flex";
}
function closeModal() {
  $("modal").style.display = "none";
}

// 清空（iOS+电脑兼容）
function clearAll() {
  if (!confirm(`确定清空【${QUESTION_SET_ID}】所有记录？`)) return;
  doneIds = [];
  wrong = [];
  lastQuestion = null;
  current = null;
  try {
    localStorage.removeItem(STORAGE_KEY_DONE);
    localStorage.removeItem(STORAGE_KEY_WRONG);
    localStorage.setItem(STORAGE_KEY_DONE, "[]");
    localStorage.setItem(STORAGE_KEY_WRONG, "[]");
  } catch (e) {}
  refreshStat();

  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  if (isIOS) {
    setTimeout(() => window.location.reload(), 100);
  } else {
    next();
  }
}

// 模式切换
$("m-all").onclick = () => {
  mode = "normal";
  $("m-all").classList.add("active");
  $("m-wrong").classList.remove("active");
  lastQuestion = null;
  next();
};
$("m-wrong").onclick = () => {
  mode = "wrong";
  $("m-wrong").classList.add("active");
  $("m-all").classList.remove("active");
  lastQuestion = null;
  next();
};

// 初始化
refreshStat();
render(randomPick(undoneQuestions()));
</script>
