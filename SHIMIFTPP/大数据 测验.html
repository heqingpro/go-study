.btn-clear{background:#ff3b30;color:#fff}
.wrong-info{color:#ff3b30;text-align:center;margin:10px 0;cursor:pointer}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;justify-content:center;align-items:center}
.modal-body{background:#fff;width:90%;max-height:80vh;overflow-y:auto;padding:20px;border-radius:12px}
.list-item{padding:10px;border-bottom:1px solid #eee}

// ========== 存储键（独立不冲突） ==========
const STORAGE_KEY_DONE = "doneIds_" + QUESTION_SET_ID;
const STORAGE_KEY_WRONG = "wrong_" + QUESTION_SET_ID;

let doneIds = JSON.parse(localStorage.getItem(STORAGE_KEY_DONE) || "[]");
let wrong = JSON.parse(localStorage.getItem(STORAGE_KEY_WRONG) || "[]");

let current = null;
let lastQuestion = null;
let mode = "normal"; // normal 正常刷题 | wrong 只刷错题

function $(id) { return document.getElementById(id); }

// 去重已刷ID
function uniqueDone() {
  return [...new Set(doneIds)];
}

// 未刷题目列表
function undoneQuestions() {
  const d = uniqueDone();
  return questions.filter(q => !d.includes(q.id));
}

// 刷新统计
function refreshStat() {
  $("total").textContent = questions.length;
  $("done").textContent = uniqueDone().length;
  $("undone").textContent = undoneQuestions().length;
  $("wrong-cnt").textContent = wrong.length;
}

// 随机取一题
function randomPick(list) {
  if (!list || list.length === 0) return null;
  return list[Math.floor(Math.random() * list.length)];
}

// 渲染题目
function render(q) {
  if (!q) {
    $("qid").textContent = "";
    $("q").textContent = "暂无题目";
    $("opts").innerHTML = "";
    $("a").style.display = "none";
    return;
  }
  current = q;
  $("qid").textContent = `序号：${q.sequence} | ID：${q.id}`;
  $("q").textContent = q.content;
  $("a").style.display = "none";
  $("opts").innerHTML = "";

  q.attrs.forEach(o => {
    const div = document.createElement("div");
    div.className = "option";
    div.textContent = o.value;
    div.onclick = () => {
      $("a").style.display = "block";
      $("a").textContent = o.reason;
      const ok = /正确/.test(o.reason);
      div.classList.add(ok ? "correct" : "wrong");
      if (!ok && !wrong.some(x => x.id === q.id)) {
        wrong.push(q);
        localStorage.setItem(STORAGE_KEY_WRONG, JSON.stringify(wrong));
        refreshStat();
      }
    };
    $("opts").appendChild(div);
  });
}

// 下一题：点了才算刷过
function next() {
  // 把上一题标记为已刷
  if (lastQuestion) {
    if (!doneIds.includes(lastQuestion.id)) {
      doneIds.push(lastQuestion.id);
      localStorage.setItem(STORAGE_KEY_DONE, JSON.stringify(doneIds));
    }
  }

  // 选题逻辑：优先从未刷里随机
  let nextQ = null;
  if (mode === "normal") {
    const undone = undoneQuestions();
    if (undone.length > 0) {
      nextQ = randomPick(undone);
    } else {
      alert("已刷完全部题目！");
      nextQ = randomPick(questions);
    }
  } else {
    // 错题模式
    if (wrong.length === 0) {
      alert("暂无错题");
      mode = "normal";
      $("m-all").classList.add("active");
      $("m-wrong").classList.remove("active");
      next();
      return;
    }
    nextQ = randomPick(wrong);
  }

  lastQuestion = nextQ;
  render(nextQ);
  refreshStat();
}

// 错题列表
function showWrong() {
  let html = "<h4>错题列表</h4>";
  if (wrong.length === 0) html += "<p>暂无错题</p>";
  else wrong.forEach((q, i) => {
    html += `<div class="list-item">${i+1}. [${q.sequence}] ${q.content}</div>`;
  });
  $("list-content").innerHTML = html;
  $("modal").style.display = "flex";
}
function closeModal() {
  $("modal").style.display = "none";
}

// 清空（iOS+电脑兼容）
function clearAll() {
  if (!confirm(`确定清空【${QUESTION_SET_ID}】所有记录？`)) return;
  doneIds = [];
  wrong = [];
  lastQuestion = null;
  current = null;
  try {
    localStorage.removeItem(STORAGE_KEY_DONE);
    localStorage.removeItem(STORAGE_KEY_WRONG);
    localStorage.setItem(STORAGE_KEY_DONE, "[]");
    localStorage.setItem(STORAGE_KEY_WRONG, "[]");
  } catch (e) {}
  refreshStat();

  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  if (isIOS) {
    setTimeout(() => window.location.reload(), 100);
  } else {
    next();
  }
}

// 模式切换
$("m-all").onclick = () => {
  mode = "normal";
  $("m-all").classList.add("active");
  $("m-wrong").classList.remove("active");
  lastQuestion = null;
  next();
};
$("m-wrong").onclick = () => {
  mode = "wrong";
  $("m-wrong").classList.add("active");
  $("m-all").classList.remove("active");
  lastQuestion = null;
  next();
};

// 初始化
refreshStat();
render(randomPick(undoneQuestions()));
</script>
