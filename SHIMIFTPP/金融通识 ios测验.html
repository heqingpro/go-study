// ========================================

const STORAGE_KEY_DONE = "doneIds_" + QUESTION_SET_ID;
const STORAGE_KEY_WRONG = "wrong_" + QUESTION_SET_ID;

let doneIds = JSON.parse(localStorage.getItem(STORAGE_KEY_DONE) || "[]");
let wrong = JSON.parse(localStorage.getItem(STORAGE_KEY_WRONG) || "[]");

let current = null;
let preQuestion = null; // 上一题，用来点下一题再归档
let mode = "all";

function $(id){return document.getElementById(id)}

function getUniqueDoneIds(){return [...new Set(doneIds)]}

function getUndoneQuestions(){
  const done = getUniqueDoneIds();
  return questions.filter(q=>!done.includes(q.id));
}

function refreshStat(){
  $("total").textContent = questions.length;
  $("done").textContent = getUniqueDoneIds().length;
  $("undone").textContent = getUndoneQuestions().length;
  $("wrong-cnt").textContent = wrong.length;
}

function getPool(){
  return mode==="wrong"?wrong:questions;
}

// 核心：点下一题才把【上一题】记入已刷
function next(){
  // 1. 先把上一题归档
  if(preQuestion && !doneIds.includes(preQuestion.id)){
    doneIds.push(preQuestion.id);
    localStorage.setItem(STORAGE_KEY_DONE, JSON.stringify(doneIds));
  }

  // 2. 再抽新题当当前题
  const pool = getPool();
  if(pool.length===0){alert("当前题库无题目");return;}

  current = pool[Math.floor(Math.random()*pool.length)];
  preQuestion = current; // 缓存为下一次的“上一题”

  renderQuestion();
  refreshStat();
}

function renderQuestion(){
  if(!current)return;
  $("qid").textContent = `序号：${current.sequence} | ID：${current.id}`;
  $("q").textContent = current.content;
  $("a").style.display = "none";
  $("opts").innerHTML = "";

  current.attrs.forEach(o=>{
    const d = document.createElement("div");
    d.className = "option";
    d.textContent = o.value;
    d.onclick = ()=>{
      $("a").style.display = "block";
      $("a").textContent = o.reason;
      const ok = /正确/.test(o.reason);
      d.classList.add(ok?"correct":"wrong");
      if(!ok && !wrong.some(x=>x.id===current.id)){
        wrong.push(current);
        localStorage.setItem(STORAGE_KEY_WRONG, JSON.stringify(wrong));
        refreshStat();
      }
    };
    $("opts").appendChild(d);
  });
}

function showWrong(){
  let html="<h4>错题列表</h4>";
  if(wrong.length===0)html+="<p>暂无错题</p>";
  else wrong.forEach((q,i)=>{
    html += `<div class="list-item">${i+1}. [${q.sequence}] ${q.content}</div>`;
  });
  $("list-content").innerHTML=html;
  $("modal").style.display="flex";
}
function closeModal(){$("modal").style.display="none";}

// 清空兼容iOS+电脑
function clearAll(){
  if(!confirm(`确定清空【${QUESTION_SET_ID}】所有记录？`))return;
  doneIds=[];wrong=[];preQuestion=null;current=null;
  try{
    localStorage.removeItem(STORAGE_KEY_DONE);
    localStorage.removeItem(STORAGE_KEY_WRONG);
    localStorage.setItem(STORAGE_KEY_DONE,JSON.stringify([]));
    localStorage.setItem(STORAGE_KEY_WRONG,JSON.stringify([]));
  }catch(e){}
  refreshStat();

  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
  if(isIOS){
    setTimeout(()=>window.location.reload(),100);
  }else{
    next();
  }
}

$("m-all").onclick=()=>{mode="all";$("m-all").classList.add("active");$("m-wrong").classList.remove("active");next()}
$("m-wrong").onclick=()=>{mode="wrong";$("m-wrong").classList.add("active");$("m-all").classList.remove("active");next()}

// 初始化：只展示，不计数
refreshStat();
// 首次加载题目，但不算已刷
const initPool = getPool();
if(initPool.length>0){
  current = initPool[Math.floor(Math.random()*initPool.length)];
  preQuestion = null; // 刚打开不算
  renderQuestion();
}
</script>
